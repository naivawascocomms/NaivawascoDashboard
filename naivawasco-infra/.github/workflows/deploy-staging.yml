name: Deploy Staging

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - backend-staging-image
      - frontend-staging-image

concurrency:
  group: naivawasco-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, naivawasco-prod]
    environment:
      name: staging
      url: https://staging.your-domain.com
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file
        run: |
          mkdir -p /opt/naivawasco/staging
          cp compose/docker-compose.staging.yml /opt/naivawasco/staging/docker-compose.yml

      - name: Login to GHCR
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          if [ -n "$GHCR_READ_TOKEN" ]; then
            echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          else
            echo "GHCR_READ_TOKEN not set; skipping registry login."
          fi

      - name: Deploy staging
        run: bash scripts/deploy.sh /opt/naivawasco/staging naivawasco-staging

      - name: Healthcheck
        run: bash scripts/healthcheck.sh https://staging.your-domain.com
